<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Watch Webbed Films</title>
  <link rel="icon" type="image/png" href="/assets/images/favicon.png">
  <link rel="stylesheet" href="/admin-assets/css/admin.css">
</head>
<body>
  <header class="admin-header">
    <div style="display:flex;align-items:center;gap:14px;">
      <a href="/admin" onclick="event.preventDefault(); showSection('home')"><img src="/assets/images/watch-logo.png" alt="Watch Webbed Films" class="admin-logo"></a>
      <span class="tag">// Admin</span>
    </div>
    <div class="admin-header-right">
      <a href="/" target="_blank" class="btn-logout">View Site</a>
      <button id="btn-logout" class="btn-logout">Logout</button>
    </div>
  </header>

  <div class="admin-content">
    <!-- HOME -->
    <div id="section-home" class="admin-section active">
      <div class="action-boxes">
        <button class="action-box" onclick="showSection('films')">
          <span class="action-box-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="2"/><path d="M2 7h20M2 17h20M7 2v20"/></svg>
          </span>
          <span class="action-box-title">Films</span>
          <span class="action-box-desc">Manage public film catalog</span>
          <span class="action-box-count" id="home-films-count"></span>
        </button>
        <button class="action-box" onclick="showSection('projects')">
          <span class="action-box-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
          </span>
          <span class="action-box-title">Client Projects</span>
          <span class="action-box-desc">Manage client screenings</span>
          <span class="action-box-count" id="home-projects-count"></span>
        </button>
      </div>
      <div id="home-requests-alert"></div>
    </div>

    <!-- FILMS SECTION -->
    <div id="section-films" class="admin-section">
      <button class="back-btn" onclick="showSection('home')">&#8592; Back</button>
      <div class="section-head">
        <h2>Films</h2>
        <button class="btn-add-pill" id="btn-add-film">+ Add Film</button>
      </div>
      <div id="films-list"></div>
    </div>

    <!-- PROJECTS SECTION -->
    <div id="section-projects" class="admin-section">
      <button class="back-btn" onclick="showSection('home')">&#8592; Back</button>
      <div class="section-head">
        <h2>Client Projects</h2>
        <button class="btn" id="btn-add-project">+ New Project</button>
      </div>
      <div id="projects-list"></div>
    </div>

    <!-- PROJECT DETAIL SECTION -->
    <div id="section-project-detail" class="admin-section">
      <button class="back-btn" onclick="showSection('projects')">&#8592; Back</button>
      <div id="project-detail-content"></div>
    </div>

    <!-- ACCESS REQUESTS SECTION -->
    <div id="section-requests" class="admin-section">
      <button class="back-btn" onclick="showSection('home')">&#8592; Back</button>
      <div class="section-head">
        <h2>Access Requests</h2>
      </div>
      <div id="requests-list"></div>
    </div>
  </div>

  <!-- FILM MODAL (Add / Edit) -->
  <div id="film-modal" class="modal-overlay hidden">
    <div class="modal">
      <h3 id="film-modal-title">Add Film</h3>
      <input type="hidden" id="film-edit-slug">
      <form id="film-form">

        <!-- Video file upload -->
        <div class="form-group">
          <label>Video File</label>
          <div id="film-video-picker" class="video-picker">
            <input type="file" id="film-video-input" accept="video/*" style="display:none">
            <button type="button" id="film-video-btn" class="video-picker-btn">Choose video file...</button>
            <span id="film-video-name" class="video-picker-name"></span>
          </div>
          <!-- Upload + transcode progress (hidden until active) -->
          <div id="film-upload-progress" class="modal-progress" style="display:none">
            <div class="upload-progress-bar"><div id="film-progress-filled" class="upload-progress-filled"></div></div>
            <p id="film-progress-text" class="upload-progress-text"></p>
          </div>
          <!-- For edit mode: show current video -->
          <input type="hidden" id="film-video-path">
        </div>

        <div class="form-group">
          <label>Title</label>
          <input type="text" id="film-title" required>
        </div>
        <div class="form-group" id="film-slug-group">
          <label>Slug</label>
          <input type="text" id="film-slug" placeholder="auto-generated from title">
        </div>
        <div class="form-group">
          <label>Category</label>
          <select id="film-category">
            <option value="">Select category...</option>
            <option value="Feature Films">Feature Films</option>
            <option value="Short Films">Short Films</option>
            <option value="Media Zoo">Media Zoo</option>
            <option value="Ratcliffe Studios">Ratcliffe Studios</option>
            <option value="Revelstoke Films">Revelstoke Films</option>
            <option value="Showreels">Showreels</option>
            <option value="Trailers and BTS">Trailers and BTS</option>
            <option value="Webbed Films">Webbed Films</option>
          </select>
        </div>
        <div class="form-group">
          <label>Year</label>
          <input type="number" id="film-year" value="2026">
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="film-description" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label>Visibility</label>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="film-visibility" value="public" checked>
              <span>Public</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="film-visibility" value="private">
              <span>Private</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="film-visibility" value="client">
              <span>Client</span>
            </label>
          </div>
          <p class="form-hint" id="visibility-hint">Visible to everyone</p>
        </div>
        <div class="form-group" id="film-password-group" style="display:none">
          <label>Password</label>
          <div class="password-field-wrap">
            <input type="text" id="film-password" placeholder="Enter password">
            <span id="film-password-status" class="password-status"></span>
          </div>
        </div>
        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="film-featured">
            <span>Eligible for Film of the Day</span>
          </label>
        </div>
        <div class="form-group">
          <label>Thumbnail</label>
          <div id="thumb-preview" class="thumb-preview" style="display:none">
            <img id="thumb-preview-img" src="" alt="Thumbnail preview">
            <span class="thumb-preview-label">Auto-generated from video</span>
          </div>
          <p class="form-hint">Auto-generated from video at 25%</p>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-danger" onclick="closeModal('film-modal')">Cancel</button>
          <button type="submit" class="btn" id="film-submit-btn" disabled>Add Film</button>
        </div>
      </form>
    </div>
  </div>

  <!-- PROJECT MODAL (Add / Edit title only) -->
  <div id="project-modal" class="modal-overlay hidden">
    <div class="modal">
      <h3 id="project-modal-title">New Client Project</h3>
      <input type="hidden" id="project-edit-uuid">
      <form id="project-form">
        <div class="form-group">
          <label>Project Title</label>
          <input type="text" id="project-title" required>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-danger" onclick="closeModal('project-modal')">Cancel</button>
          <button type="submit" class="btn" id="project-submit-btn">Create Project</button>
        </div>
      </form>
    </div>
  </div>

  <!-- VERSION UPLOAD MODAL -->
  <div id="version-modal" class="modal-overlay hidden">
    <div class="modal">
      <h3>Add Version</h3>
      <form id="version-form">
        <input type="hidden" id="version-project-uuid">
        <div class="form-group">
          <label>Video File</label>
          <div class="video-picker">
            <input type="file" id="version-video-input" accept="video/*" style="display:none">
            <button type="button" id="version-video-btn" class="video-picker-btn">Choose video file...</button>
            <span id="version-video-name" class="video-picker-name"></span>
          </div>
          <div id="version-upload-progress" class="modal-progress" style="display:none">
            <div class="upload-progress-bar"><div id="version-progress-filled" class="upload-progress-filled"></div></div>
            <p id="version-progress-text" class="upload-progress-text"></p>
          </div>
          <input type="hidden" id="version-video-path">
        </div>
        <div class="form-group">
          <label>Note</label>
          <input type="text" id="version-note" placeholder="e.g. Final Cut, Color Grade v2">
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-danger" onclick="closeModal('version-modal')">Cancel</button>
          <button type="submit" class="btn" id="version-submit-btn" disabled>Add Version</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="/admin-assets/js/admin.js?v=5"></script>
</body>
</html>
