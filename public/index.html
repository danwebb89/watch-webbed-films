    <img src="/assets/images/watch-logo-opt.png" alt="">
    <div class="loader-scanline"></div>
  </div>
  <script>
    (function(){var t=setTimeout(function(){document.getElementById('site-loader').classList.add('show-loader');},400);window.__cancelLoader=function(){clearTimeout(t);};})();
  </script>

  <div class="work-bg-overlay"></div>

  <header class="site-header">
    <a href="/" class="logo-link"><img src="/assets/images/watch-logo-opt.png" alt="Watch Webbed Films" class="logo"></a>
    <nav class="site-nav">
      <a href="/" class="active">Films</a>
      <a href="/clients.html">Client Screenings</a>
      <a href="https://www.webbedfilms.com" target="_blank">Main Site</a>
    </nav>
    <button class="hamburger" id="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </header>
  <div class="mobile-nav-overlay" id="mobile-nav">
    <a href="/" class="active">Films</a>
    <a href="/clients.html">Client Screenings</a>
    <a href="https://www.webbedfilms.com" target="_blank">Main Site</a>
  </div>

  <div id="grade-ui">

    <!-- ZONE 1: Grade Monitor -->
    <div id="monitor" class="monitor" aria-label="Film of the Day preview">
      <span class="mon-label mon-label-tl">SCREENING · ROOM</span>
      <span class="mon-label mon-label-bl">WEBBED FILMS · DANIEL WEBB</span>
      <span class="mon-label mon-label-br" id="timecode" aria-hidden="true">00:00:00:00</span>

      <div class="corner corner-tl" aria-hidden="true"></div>
      <div class="corner corner-tr" aria-hidden="true"></div>
      <div class="corner corner-bl" aria-hidden="true"></div>
      <div class="corner corner-br" aria-hidden="true"></div>

      <canvas id="monitor-canvas" aria-hidden="true"></canvas>
      <div id="monitor-thumb-a" class="monitor-thumb" aria-hidden="true"></div>
      <div id="monitor-thumb-b" class="monitor-thumb" aria-hidden="true"></div>
      <div id="monitor-scanlines" aria-hidden="true"></div>
      <div id="monitor-vignette" aria-hidden="true"></div>
      <div id="monitor-idle-wash" aria-hidden="true"></div>
      <div id="monitor-gradient" aria-hidden="true"></div>

      <div id="monitor-idle">
        <span class="idle-msg">// FILM OF THE DAY</span>
      </div>

      <div id="monitor-hover" aria-hidden="true">
        <div class="hover-cat" id="hover-cat"></div>
        <div class="hover-title" id="hover-title"></div>
        <div class="hover-subtitle" id="hover-subtitle"></div>
      </div>

      <div class="monitor-play-btn" id="monitor-play-btn">
        <div class="player-big-play-btn">
          <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
        </div>
      </div>
    </div>

    <!-- Status Bar -->
    <div id="status-bar">
      <span class="sb-text">WATCH · WEBBED FILMS</span>
      <span class="sb-pipe"></span>
      <span class="sb-text sb-counts" id="sb-counts"></span>
      <span class="sb-pipe"></span>
      <span class="sb-text">SCREENING ROOM</span>
    </div>

  </div>

  <!-- Browse Portfolio -->
  <div id="portfolio-browse">
    <div class="browse-controls">
      <div class="browse-search-bar">
        <input type="text" id="film-search" class="browse-search-input" placeholder="Search films...">
      </div>
      <div class="browse-filter-bar">
        <button class="browse-filter active" data-cat="all">All</button>
        <button class="browse-filter" data-cat="Feature Films">Feature Films</button>
        <button class="browse-filter" data-cat="Short Films">Short Films</button>
        <button class="browse-filter" data-cat="Documentary">Documentary</button>
        <button class="browse-filter" data-cat="Original">Original</button>
        <button class="browse-filter" data-cat="Corporate">Corporate</button>
      </div>
      <select class="browse-filter-select" id="filter-select">
        <option value="all">All Categories</option>
        <option value="Feature Films">Feature Films</option>
        <option value="Short Films">Short Films</option>
        <option value="Documentary">Documentary</option>
        <option value="Original">Original</option>
        <option value="Corporate">Corporate</option>
      </select>
    </div>
    <div class="screening-code-link">
      <button class="screening-code-toggle" id="screening-code-toggle">Have a screening code?</button>
      <form class="screening-code-form" id="screening-code-form">
        <input type="text" id="screening-code-input" placeholder="Enter code">
        <button type="submit" class="btn">View</button>
      </form>
    </div>
    <div id="film-grid" class="browse-grid"></div>
  </div>

  <!-- Password Modal -->
  <div id="password-modal" class="pw-modal-overlay hidden">
    <div class="pw-modal">
      <button class="pw-modal-close" onclick="document.getElementById('password-modal').classList.add('hidden')">&times;</button>
      <div class="pw-modal-lock">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="32" height="32">
          <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM12 17c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1s3.1 1.39 3.1 3.1v2z"/>
        </svg>
      </div>
      <h3 id="pw-modal-title" class="pw-modal-title"></h3>
      <p class="pw-modal-subtitle">This film is password protected</p>
      <form id="pw-modal-form">
        <input type="password" id="pw-modal-input" placeholder="Enter password" autocomplete="off">
        <p id="pw-modal-error" class="pw-modal-error"></p>
        <button type="submit" class="btn">Unlock</button>
      </form>
      <div class="pw-modal-divider"><span>or</span></div>
      <button class="pw-request-btn" id="pw-request-toggle">Request Access</button>
      <form id="pw-request-form" class="pw-request-form hidden">
        <input type="text" id="pw-request-name" placeholder="Your name" required>
        <input type="email" id="pw-request-email" placeholder="Your email" required>
        <textarea id="pw-request-reason" placeholder="Reason for access (optional)" rows="2"></textarea>
        <p id="pw-request-error" class="pw-modal-error"></p>
        <button type="submit" class="btn">Send Request</button>
      </form>
      <p id="pw-request-success" class="pw-request-success hidden">Request sent — you'll be contacted when approved.</p>
    </div>
  </div>
