<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/assets/images/favicon.png?v=4">
  <link rel="apple-touch-icon" href="/assets/images/apple-touch-icon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Project — Webbed Films Client Portal.">
  <meta property="og:title" content="Project — Webbed Films">
  <meta property="og:image" content="/assets/images/watch-logo.png">
  <meta property="og:type" content="video.other">
  <meta name="robots" content="noindex, nofollow">
  <title>Project — Webbed Films</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500&display=swap">
  <link rel="stylesheet" href="/css/style.css?v=63">
</head>
<body class="watch-page view-page">
  <a href="#main-content" class="skip-link">Skip to content</a>

  <div class="work-bg-overlay"></div>

  <header class="site-header">
    <a href="/" class="logo-link"><img src="/assets/images/watch-logo.png" alt="Watch Webbed Films" class="logo"></a>
    <button class="hamburger" id="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <nav class="site-nav" id="site-nav">
      <a href="/">Films</a>
      <a href="/portal" class="active">Client Portal</a>
      <a href="https://webbedfilms.com" target="_blank" rel="noopener noreferrer">Main Site</a>
    </nav>
  </header>

  <div id="main-content" class="watch-container" style="padding-top:calc(var(--header-h) + 24px)">
    <!-- Breadcrumb + Review button -->
    <div class="view-header-row">
      <nav class="portal-breadcrumb" id="breadcrumb"></nav>
      <a href="#" class="view-review-btn" id="review-btn">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
        Review &amp; Comment
      </a>
    </div>

    <!-- Cinematic video container -->
    <div class="view-player-container">
      <!-- Video Player -->
      <div id="player-wrap" class="player-wrap">
        <video id="video" preload="metadata"></video>
        <div id="player-loading" class="player-loading" style="display:none"></div>

        <div id="big-play" class="player-big-play">
          <div class="player-big-play-btn">
            <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
          </div>
        </div>

        <div id="controls" class="player-controls">
          <div id="progress" class="player-progress">
            <div id="progress-filled" class="player-progress-filled"></div>
          </div>
          <div class="player-buttons">
            <button id="btn-play" class="player-btn" title="Play/Pause">
              <svg id="icon-play" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
              <svg id="icon-pause" viewBox="0 0 24 24" style="display:none">
                <rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/>
              </svg>
            </button>

            <div class="player-volume-wrap">
              <button id="btn-mute" class="player-btn" title="Mute">
                <svg id="icon-vol" viewBox="0 0 24 24">
                  <path d="M3 9v6h4l5 5V4L7 9H3z"/>
                  <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
                </svg>
                <svg id="icon-muted" viewBox="0 0 24 24" style="display:none">
                  <path d="M3 9v6h4l5 5V4L7 9H3z"/>
                  <line x1="23" y1="9" x2="17" y2="15" stroke="currentColor" stroke-width="2"/>
                  <line x1="17" y1="9" x2="23" y2="15" stroke="currentColor" stroke-width="2"/>
                </svg>
              </button>
              <div id="volume-bar" class="player-volume">
                <div id="volume-filled" class="player-volume-filled"></div>
              </div>
            </div>

            <div class="player-spacer"></div>

            <span id="time-display" class="player-time">00:00.0 / 00:00.0</span>

            <button id="btn-speed" class="player-btn player-speed-btn" title="Playback speed">1x</button>

            <button id="btn-fs" class="player-btn" title="Fullscreen">
              <svg viewBox="0 0 24 24">
                <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Non-video deliverable content area -->
      <div id="deliverable-content" style="display:none"></div>
    </div>

    <!-- View metadata below video -->
    <div class="view-meta">
      <h1 id="project-title" class="view-title"></h1>
      <p id="project-description" class="view-description"></p>

      <!-- Format Selector (hidden when single format) -->
      <div id="format-section" style="display:none">
        <p class="portal-selector-label">Available Formats</p>
        <div id="format-selector" class="portal-format-selector"></div>
      </div>

      <!-- Version Selector + Download -->
      <div class="view-controls-row">
        <div id="version-selector" class="portal-version-selector"></div>
        <a id="download-btn" class="btn portal-download-btn" style="display:none" download>
          <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
          Download
        </a>
      </div>
      <p id="version-note" class="portal-version-note"></p>
      <!-- External links for current deliverable -->
      <div id="deliverable-links" style="display:none;margin-top:16px;"></div>
    </div>

    <!-- Empty state -->
    <div id="no-versions" class="empty-state" style="display:none">
      <p>No video versions uploaded yet</p>
    </div>
  </div>

  <footer class="site-footer">
    <div class="footer-row">
      <span class="footer-copy">&copy; 2026 Webbed Films</span>
      <span class="footer-tagline">Integrity &middot; Quality &middot; Effort</span>
      <div class="footer-social">
        <a href="mailto:hello@webbedfilms.com" aria-label="Email">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
          </svg>
        </a>
        <a href="https://www.instagram.com/webbedfilms/" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
          </svg>
        </a>
        <a href="https://www.linkedin.com/company/webbed-films" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
          </svg>
        </a>
      </div>
    </div>
  </footer>

  <script defer src="/js/dynamics.js?v=7"></script>
  <script defer src="/js/player.js?v=8"></script>
  <script defer src="/js/transitions.js?v=5"></script>
  <script defer src="/js/portal-project.js?v=8"></script>
</body>
</html>
