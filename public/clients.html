<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Screenings — Webbed Films</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <a href="/" class="logo-link"><img src="/assets/images/logo.png" alt="Webbed Films" class="logo"></a>
    <nav class="site-nav">
      <a href="/">Films</a>
      <a href="/clients.html" class="active">Client Screenings</a>
    </nav>
  </header>

  <div class="page-content">
    <main class="clients-body">
      <section class="page-title">
        <h1>Screenings</h1>
        <p class="subtitle">// Enter your screening code to view your project</p>
      </section>

      <div class="screening-access">
        <form id="access-form">
          <input type="text" id="screening-code" placeholder="Screening code" autofocus>
          <button type="submit" class="btn">View</button>
        </form>
      </div>
    </main>

    <footer class="site-footer">
      <p>&copy; 2025 Webbed Films</p>
    </footer>
  </div>

  <script>
    document.getElementById('access-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const code = document.getElementById('screening-code').value.trim();
      if (code) {
        window.location.href = '/screening.html?id=' + encodeURIComponent(code);
      }
    });
  </script>
</body>
</html>
