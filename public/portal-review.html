<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/assets/images/favicon.png?v=4">
  <link rel="apple-touch-icon" href="/assets/images/apple-touch-icon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Review — Webbed Films Client Portal.">
  <meta property="og:title" content="Review — Webbed Films">
  <meta property="og:image" content="/assets/images/watch-logo.png">
  <meta property="og:type" content="video.other">
  <meta name="robots" content="noindex, nofollow">
  <title>Review — Webbed Films</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500&display=swap">
  <link rel="stylesheet" href="/css/style.css?v=64">
</head>
<body class="review-page">

  <!-- REVIEW TOP BAR (Frame.io style) -->
  <div class="review-top-bar">
    <div class="review-top-left">
      <a class="review-back-btn" id="review-back-btn" href="#" title="Back to project">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      </a>
      <span class="review-deliverable-name" id="review-deliverable-name"></span>
      <select class="review-version-dropdown" id="review-version-dropdown"></select>
    </div>
    <div class="review-top-right">
      <span class="review-status-badge" id="review-status-badge" style="display:none"></span>
      <a class="review-download-btn" id="review-download-btn" href="#" download style="display:none">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
        <span id="review-download-text">Download</span>
      </a>
    </div>
  </div>

  <!-- MAIN REVIEW LAYOUT -->
  <div class="review-content">

    <!-- LEFT: Video player area -->
    <div class="review-player-area">
      <div id="player-wrap" class="player-wrap">
        <video id="video" preload="metadata"></video>
        <div id="player-loading" class="player-loading" style="display:none"></div>

        <div id="big-play" class="player-big-play">
          <div class="player-big-play-btn">
            <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
          </div>
        </div>

        <div id="controls" class="player-controls">
          <div id="progress" class="player-progress">
            <div id="progress-filled" class="player-progress-filled"></div>
            <div id="comment-markers" class="comment-markers"></div>
          </div>
          <div class="player-buttons">
            <button id="btn-play" class="player-btn" title="Play/Pause">
              <svg id="icon-play" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
              <svg id="icon-pause" viewBox="0 0 24 24" style="display:none">
                <rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/>
              </svg>
            </button>

            <div class="player-volume-wrap">
              <button id="btn-mute" class="player-btn" title="Mute">
                <svg id="icon-vol" viewBox="0 0 24 24">
                  <path d="M3 9v6h4l5 5V4L7 9H3z"/>
                  <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
                </svg>
                <svg id="icon-muted" viewBox="0 0 24 24" style="display:none">
                  <path d="M3 9v6h4l5 5V4L7 9H3z"/>
                  <line x1="23" y1="9" x2="17" y2="15" stroke="currentColor" stroke-width="2"/>
                  <line x1="17" y1="9" x2="23" y2="15" stroke="currentColor" stroke-width="2"/>
                </svg>
              </button>
              <div id="volume-bar" class="player-volume">
                <div id="volume-filled" class="player-volume-filled"></div>
              </div>
            </div>

            <div class="player-spacer"></div>

            <span id="time-display" class="player-time">00:00 / 00:00</span>

            <button id="btn-speed" class="player-btn player-speed-btn" title="Playback speed">1x</button>

            <button id="btn-fs" class="player-btn" title="Fullscreen">
              <svg viewBox="0 0 24 24">
                <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Non-video deliverable content area -->
      <div id="deliverable-content" style="display:none"></div>

      <!-- Comment Input (below video) -->
      <div id="comment-input-wrap" class="comment-input-wrap" style="display:none">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;">
          <span id="comment-timecode-badge" class="comment-timecode-badge"></span>
          <span id="comment-author-label" class="comment-author-label"></span>
        </div>
        <textarea id="comment-text-input" class="comment-text-input" placeholder="Add your feedback..." rows="2" aria-label="Add your feedback"></textarea>
        <div class="comment-input-actions">
          <button id="comment-cancel-btn" class="btn btn-sm" style="border-color:var(--color-muted);color:var(--color-muted)">Cancel</button>
          <button id="comment-submit-btn" class="btn btn-sm">Post Comment</button>
        </div>
      </div>

      <!-- Name Prompt (shown once) -->
      <div id="commenter-name-bar" class="commenter-name-bar" style="display:none">
        <label>Your name:</label>
        <input type="text" id="commenter-name-input" placeholder="Enter your name" aria-label="Your name">
        <button id="commenter-name-save" class="btn btn-sm">Save</button>
      </div>

      <!-- Format Selector (hidden when single format) -->
      <div id="format-section" style="display:none">
        <p class="portal-selector-label">Formats</p>
        <div id="format-selector" class="portal-format-selector"></div>
      </div>
    </div>

    <!-- RIGHT: Feedback panel -->
    <div id="review-panel" class="review-feedback-panel">
      <div class="review-panel-header">
        <span class="review-panel-title">Feedback</span>
        <span class="review-panel-count" id="comments-count"></span>
        <button class="review-add-note-btn" id="review-add-note-btn" title="Add a note at the current timecode">+ Add Note</button>
      </div>

      <div class="review-panel-filters" id="review-filters">
        <button class="review-filter-btn active" data-filter="all">All</button>
        <button class="review-filter-btn" data-filter="unresolved">Unresolved</button>
        <button class="review-filter-btn" data-filter="resolved">Resolved</button>
      </div>

      <div id="comments-list" class="review-comments-list"></div>

      <div class="review-panel-empty" id="comments-empty">
        <p>Click the timeline to leave feedback at a specific moment</p>
        <p class="review-panel-hint">Tip: click the timeline or press <kbd>C</kbd> to comment at a specific moment</p>
      </div>

      <!-- Approval Section -->
      <div class="review-panel-approval">
        <div class="review-panel-approval-header">Approval</div>
        <div id="approval-bar" class="approval-bar" style="display:none">
          <button id="btn-approve" class="approval-btn approval-btn-approve">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
            Approve
          </button>
          <button id="btn-request-changes" class="approval-btn approval-btn-changes">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
            Request Changes
          </button>
          <div id="approval-status-display" class="approval-status" style="display:none"></div>
        </div>
        <div id="approval-comment-wrap" style="display:none">
          <textarea id="approval-comment-input" class="comment-text-input" placeholder="Describe the changes you'd like..." rows="3" aria-label="Describe the changes you would like"></textarea>
          <div class="comment-input-actions">
            <button id="approval-cancel-btn" class="btn btn-sm" style="border-color:var(--color-muted);color:var(--color-muted)">Cancel</button>
            <button id="approval-submit-btn" class="btn btn-sm approval-btn-changes">Submit</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Empty state -->
  <div id="no-versions" class="empty-state" style="display:none">
    <p>No video versions uploaded yet</p>
  </div>

  <script defer src="/js/dynamics.js?v=8"></script>
  <script defer src="/js/player.js?v=8"></script>
  <script defer src="/js/portal-review.js?v=7"></script>
</body>
</html>
