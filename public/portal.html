  <script>
    document.getElementById('portal-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const code = document.getElementById('portal-code').value.trim();
      const errorEl = document.getElementById('portal-error');
      errorEl.textContent = '';
      if (!code) return;

      const slug = code.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
      try {
        const res = await fetch('/api/public/portal/' + encodeURIComponent(slug));
        if (res.ok) {
          window.location.href = '/portal/' + encodeURIComponent(slug);
        } else {
          errorEl.textContent = 'Portal not found — check your code';
        }
      } catch {
        errorEl.textContent = 'Unable to connect';
      }
    });
  </script>
