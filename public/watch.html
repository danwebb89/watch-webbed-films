<body class="watch-page">
  <a href="#main-content" class="skip-link">Skip to content</a>

  <div class="work-bg-overlay"></div>

  <div class="site-loader" id="site-loader">
    <img src="/assets/images/watch-logo.png" alt="Loading Webbed Films">
    <div class="loader-scanline"></div>
  </div>

  <header class="site-header">
    <a href="/" class="logo-link"><img src="/assets/images/watch-logo.png" alt="Watch Webbed Films" class="logo"></a>
    <button class="hamburger" id="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <nav class="site-nav" id="site-nav">
      <a href="/">Films</a>
      <a href="/portal">Client Portal</a>
      <a href="https://webbedfilms.com" target="_blank" rel="noopener noreferrer">Main Site</a>
    </nav>
  </header>

  <div class="page-content">
    <!-- The screening room — one unified experience -->
    <div class="watch-cinema-zone">
      <!-- Projector beam from above -->
      <div class="projector-beam" aria-hidden="true"></div>
      <!-- Anamorphic lens flare -->
      <div class="anamorphic-flare" aria-hidden="true"></div>
      <!-- Cinema dust particles -->
      <canvas id="cinema-dust" class="cinema-dust" aria-hidden="true"></canvas>

      <div id="player-backdrop" class="player-backdrop"></div>

      <div class="watch-screen">
        <!-- Screen reflection below player -->
        <div class="screen-reflection" aria-hidden="true"></div>
        <div id="player-wrap" class="player-wrap">
          <!-- Cinema screen frame (inside player-wrap so it hugs the video) -->
          <div class="screen-frame">
            <div class="frame-corner frame-tl"></div>
            <div class="frame-corner frame-tr"></div>
            <div class="frame-corner frame-bl"></div>
            <div class="frame-corner frame-br"></div>
            <div class="frame-edge frame-top"></div>
            <div class="frame-edge frame-bottom"></div>
            <div class="frame-edge frame-left"></div>
            <div class="frame-edge frame-right"></div>
          </div>
          <video id="video" preload="metadata"></video>
          <div class="player-vignette-overlay"></div>

          <!-- Film info overlaid on the video -->
          <div class="watch-film-info">
            <h1 id="watch-title" class="watch-title"></h1>
            <div id="watch-meta" class="watch-meta"></div>
            <div id="watch-description" class="watch-description"></div>
          </div>

          <div id="big-play" class="player-big-play">
            <div class="player-big-play-btn">
              <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
            </div>
          </div>

          <div id="controls" class="player-controls">
            <div id="progress" class="player-progress">
              <div id="progress-filled" class="player-progress-filled"></div>
            </div>
            <div class="player-buttons">
              <button id="btn-play" class="player-btn" title="Play/Pause">
                <svg id="icon-play" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
                <svg id="icon-pause" viewBox="0 0 24 24" style="display:none">
                  <rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/>
                </svg>
              </button>

              <div class="player-volume-wrap">
                <button id="btn-mute" class="player-btn" title="Mute">
                  <svg id="icon-vol" viewBox="0 0 24 24">
                    <path d="M3 9v6h4l5 5V4L7 9H3z"/>
                    <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
                  </svg>
                  <svg id="icon-muted" viewBox="0 0 24 24" style="display:none">
                    <path d="M3 9v6h4l5 5V4L7 9H3z"/>
                    <line x1="23" y1="9" x2="17" y2="15" stroke="currentColor" stroke-width="2"/>
                    <line x1="17" y1="9" x2="23" y2="15" stroke="currentColor" stroke-width="2"/>
                  </svg>
                </button>
                <div id="volume-bar" class="player-volume">
                  <div id="volume-filled" class="player-volume-filled"></div>
                </div>
              </div>

              <div class="player-spacer"></div>

              <span id="time-display" class="player-time">00:00 / 00:00</span>

              <button id="btn-fs" class="player-btn" title="Fullscreen">
                <svg viewBox="0 0 24 24">
                  <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="main-content" class="watch-below-wrap">
      <div id="watch-details" class="watch-details" style="display:none">
        <div class="watch-below-split">
          <div id="watch-synopsis" class="watch-synopsis"></div>
          <div id="watch-credits" class="watch-credits"></div>
        </div>
      </div>
      <div id="related-films" class="related-section"></div>
    </div>
